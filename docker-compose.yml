# ==============================================================================
# PlayBite — Docker Compose (Development + Production)
# ==============================================================================

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: playbite
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for rate limiting and caching in production)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PlayBite app (production build)
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/playbite?schema=public
      AUTH_SECRET: ${AUTH_SECRET:-production-secret-change-me}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NODE_ENV: production
      REDIS_URL: redis://redis:6379

volumes:
  pgdata:
